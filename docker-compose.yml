
services:
  geotop-web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: geotop-web
    ports:
      - "8000:8000"
    environment:
      GEOTOP_BIN: /opt/geotop-src/cmake-build/geotop
      JOBS_DIR: /app/runtime/jobs
    volumes:
      - ./runtime/jobs:/app/runtime/jobs
