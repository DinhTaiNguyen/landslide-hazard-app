services:
  web:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  api:
    build:
      context: ./backend
    environment:
      GEOTOP_COMMAND: ${GEOTOP_COMMAND:-/opt/geotop/geotop}
      GEOTOP_EXTRA_ARGS: ${GEOTOP_EXTRA_ARGS:-}
      GEOTOP_CONFIG_NAME: ${GEOTOP_CONFIG_NAME:-geotop.inpts}
      GEOTOP_DATA_ROOT: /app/runtime
    volumes:
      - ./runtime:/app/runtime
      # Mount your local GeoTOP binary/folder here on the VPS.
      # Example:
      # - /opt/geotop:/opt/geotop:ro
    restart: unless-stopped
