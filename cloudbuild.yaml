steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy landslide-hazard-app \
          --source ./backend \
          --region australia-southeast1 \
          --allow-unauthenticated \
          --memory 2Gi \
          --cpu 2 \
          --timeout 3600 \
          --set-env-vars CORS_ALLOW_ORIGINS=*
options:
  logging: CLOUD_LOGGING_ONLY
